<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Browse Gigs — SkillHive</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- navbar -->
  <div class="navbar">
    <div class="logo">SkillHive</div>
    <div class="nav-right">
      <a href="browse.html">Browse Gigs</a>
      <a href="postgig.html" id="postGigLink">Post a Gig</a>
      <a href="messages.html">Messages</a>
      <button onclick="logoutUser()">Logout</button>
    </div>
  </div>

  <div class="page-wrap">

    <h1>Browse Gigs</h1>
    <p class="page-sub">Find the right freelancer for your work</p>

    <!-- search and filter -->
    <div class="search-filter-box">
      <input type="text" id="searchInput" placeholder="🔍 Search gigs..." oninput="filterGigs()" />

      <select id="filterCategory" onchange="filterGigs()">
        <option value="All">All Categories</option>
        <option value="Web Design">Web Design</option>
        <option value="Graphic Design">Graphic Design</option>
        <option value="Writing">Writing</option>
        <option value="Video Editing">Video Editing</option>
        <option value="Marketing">Marketing</option>
        <option value="Other">Other</option>
      </select>
    </div>

    <!-- gigs grid -->
    <div id="gigsGrid" class="gigs-grid"></div>

    <p id="noGigsMsg" class="empty-msg" style="display:none;">No gigs found.</p>

  </div>

  <script src="script.js"></script>

</body>
</html>
