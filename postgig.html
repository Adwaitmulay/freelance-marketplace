<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Post a Gig — SkillHive</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- navbar -->
  <div class="navbar">
    <div class="logo">SkillHive</div>
    <div class="nav-right">
      <a href="browse.html">Browse Gigs</a>
      <a href="postgig.html">Post a Gig</a>
      <a href="messages.html">Messages</a>
      <button onclick="logoutUser()">Logout</button>
    </div>
  </div>

  <div class="page-wrap">

    <h1>Post a New Gig</h1>
    <p class="page-sub">List a service you offer for clients to find</p>

    <div class="form-box">

      <input type="text" id="gigTitle" placeholder="Gig Title (eg: I will design a logo for you)" />

      <select id="gigCategory">
        <option value="">-- Select Category --</option>
        <option value="Web Design">Web Design</option>
        <option value="Graphic Design">Graphic Design</option>
        <option value="Writing">Writing</option>
        <option value="Video Editing">Video Editing</option>
        <option value="Marketing">Marketing</option>
        <option value="Other">Other</option>
      </select>

      <textarea id="gigDesc" rows="4" placeholder="Describe what you offer..."></textarea>

      <input type="number" id="gigPrice" placeholder="Price in ₹" />

      <button class="submit-btn" onclick="postGig()">Post Gig</button>

      <p id="gigError" class="error-msg"></p>
      <p id="gigSuccess" class="success-msg"></p>

    </div>

    <!-- my gigs list -->
    <div class="my-gigs">
      <h2>Your Posted Gigs</h2>
      <div id="myGigsList"></div>
    </div>

  </div>

  <script src="script.js"></script>

</body>
</html>
